# Community AI Monitor — Docker Compose
# FASE 1–2: Infraestructura local + backend FastAPI.
#
# Uso:
#   docker compose up -d                    → PostgreSQL + backend
#   docker compose --profile tools up -d    → incluye pgAdmin
#
# Las credenciales por defecto son SOLO para desarrollo local.
# Pueden sobrescribirse con un archivo .env (ver .env.example).

name: community-ai-monitor

services:
  database:
    image: postgres:16-alpine
    container_name: cam-database
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cam_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cam_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-community_ai_monitor}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cam_user} -d ${POSTGRES_DB:-community_ai_monitor}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cam-backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-true}
      CAMERA_SIMULATOR_ENABLED: ${CAMERA_SIMULATOR_ENABLED:-true}
      CAMERA_SIMULATOR_AUTO_START: ${CAMERA_SIMULATOR_AUTO_START:-true}
      CAMERA_SIMULATOR_FPS: ${CAMERA_SIMULATOR_FPS:-2}
      DATABASE_URL: postgresql://${POSTGRES_USER:-cam_user}:${POSTGRES_PASSWORD:-cam_dev_password}@database:5432/${POSTGRES_DB:-community_ai_monitor}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      database:
        condition: service_healthy

  # pgAdmin es opcional: activar con --profile tools
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cam-pgadmin
    restart: unless-stopped
    profiles:
      - tools
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@localhost.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-cam_dev_password}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      database:
        condition: service_healthy

  # redis: opcional, se agregará cuando exista una necesidad real
  # (colas / workers en fases posteriores).

volumes:
  postgres_data:
